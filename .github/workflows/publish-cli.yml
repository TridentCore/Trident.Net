name: Publish CLI NuGet Package

on:
    push:
        branches:
            - main

concurrency:
    group: publish-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write

defaults:
    run:
        shell: bash

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Setup .NET
                uses: actions/setup-dotnet@v4
                with:
                    dotnet-version: 10.0

            -   name: Install GitVersion
                uses: GitTools/actions/gitversion/setup@v3.2.1
                with:
                    versionSpec: '6.x'

            -   name: Run GitVersion
                id: gitversion
                uses: GitTools/actions/gitversion/execute@v3.2.1
                with:
                    useConfigFile: true

            -   name: Check if version changed
                id: version-check
                run: |
                    semver="${{ steps.gitversion.outputs.SemVer }}"
                    if git tag -l "v${semver}" | grep -q .; then
                        echo "Version v${semver} already exists, skipping release."
                        echo "should_publish=false" >> $GITHUB_OUTPUT
                    else
                        echo "New version v${semver}, proceeding with release."
                        echo "should_publish=true" >> $GITHUB_OUTPUT
                    fi

            -   name: Install git-cliff
                if: steps.version-check.outputs.should_publish == 'true'
                run: cargo install git-cliff

            -   name: Generate changelog
                if: steps.version-check.outputs.should_publish == 'true'
                run: |
                    git-cliff \
                      --unreleased \
                      --tag "v${{ steps.gitversion.outputs.SemVer }}" \
                      --strip header \
                      -o src/TridentCore.Cli/RELEASE_NOTES.md

            -   name: Pack NuGet package
                if: steps.version-check.outputs.should_publish == 'true'
                run: |
                    dotnet pack src/TridentCore.Cli/TridentCore.Cli.csproj \
                      --configuration Release \
                      --output ./publish

            -   name: Publish to NuGet
                if: steps.version-check.outputs.should_publish == 'true'
                run: |
                    dotnet nuget push ./publish/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
                env:
                    NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

            -   name: Push tag to remote
                if: steps.version-check.outputs.should_publish == 'true'
                run: |
                    git tag "v${{ steps.gitversion.outputs.SemVer }}"
                    git push origin "v${{ steps.gitversion.outputs.SemVer }}"
